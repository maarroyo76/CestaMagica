{% extends "base.html" %} 

{% block titulo %}
  <title>Cesta Magica | Productos</title>
{% endblock %}

{% block content %}
  <div class="container mt-5">
    <h1 class="text-center mb-4">Nuestros Productos</h1>
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
      {% for producto in productos %}
      <div class="col">
        <div class="card h-100">
          <div
            class="card-img-container"
            style="height: 200px; display: flex; justify-content: center; align-items: center; overflow: hidden;">
            <img src="{{ producto.imagen.url }}" class="card-img-top" alt="{{ producto.nombre }}" style="object-fit: contain; width: 100%; max-height: 100%"/>
          </div>
          <div class="card-body">
            <h6 class="card-title text-truncate">{{ producto.nombre }}</h6>
            <p class="card-text text-truncate">
              {{ producto.descripcion|truncatechars:50 }}
            </p>
            <p class="card-text text-primary" style="font-size: 0.9rem">
              <strong>Precio: ${{ producto.precio }}</strong>
            </p>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
{% endblock %}
